<script>
try {
const {
  useState,
  useEffect,
  useMemo
} = React;

// ---------- design tokens ----------
const LIGHT = {
  bg: "#F6F8FB",
  surface: "#FFFFFF",
  ink: "#10243E",
  dim: "#5B708A",
  faint: "#93A4B8",
  line: "#E3E9F1",
  soft: "#EEF2F8",
  blue: "#1E62E0",
  blueSoft: "#E8F0FE",
  stat: "#E11D48",
  statSoft: "#FDE8EE",
  urgent: "#D97706",
  urgentSoft: "#FDF1E0",
  ok: "#0E9F6E",
  okSoft: "#E3F5EE"
};
// Night theme. Not a preference: it is the 3am reading condition. Tuned so a STAT page
// still reads as an alarm against a dark field without flash-blinding a woken physician.
const DARK = {
  bg: "#080C12",
  surface: "#121A24",
  ink: "#E6EDF6",
  dim: "#94A6BC",
  faint: "#61748B",
  line: "#243343",
  soft: "#1A2430",
  blue: "#5B9CFF",
  blueSoft: "#152742",
  stat: "#FF4D6D",
  statSoft: "#38131F",
  urgent: "#F5A524",
  urgentSoft: "#33230A",
  ok: "#2BD9A0",
  okSoft: "#0C2C23"
};
const T = {
  ...LIGHT,
  mono: "'JetBrains Mono', ui-monospace, Menlo, monospace",
  sans: "'Inter', -apple-system, 'Segoe UI', sans-serif",
  disp: "'Plus Jakarta Sans', 'Inter', sans-serif",
  shadow: "0 1px 2px rgba(16,36,62,.05), 0 8px 24px rgba(16,36,62,.07)"
};
const tier = u => u === "STAT" ? {
  c: T.stat,
  s: T.statSoft
} : u === "Urgent" ? {
  c: T.urgent,
  s: T.urgentSoft
} : {
  c: T.ok,
  s: T.okSoft
};
// lifecycle state of a page → {rank, label, c (text color), s (soft bg)}
// `me` is optional: for broadcasts, judge "accepted" by this member's personal ack.
const pState = (p, me) => {
  const accepted = p.kind === "broadcast" ? me ? !!p.members?.find(m => m.name === me)?.ack : p.members?.some(m => m.ack) : p.events.some(e => e.type === "ACK");
  const seen = p.events.some(e => e.type === "SEEN");
  const delivered = p.events.some(e => e.type === "DELIVERED");
  if (p.cancelled) return {
    rank: 4,
    label: "Cancelled",
    c: T.dim,
    s: T.line
  };
  if (p.declined) return {
    rank: 4,
    label: "Rejected",
    c: T.stat,
    s: T.statSoft
  };
  if (p.billing) return {
    rank: 4,
    label: "Billed",
    c: T.blue,
    s: T.blueSoft
  };
  if (p.completedAt) return {
    rank: 4,
    label: "Done",
    c: T.ok,
    s: T.okSoft
  };
  if (accepted) return {
    rank: 3,
    label: "Accepted",
    c: T.ok,
    s: T.okSoft
  };
  if (seen) return {
    rank: 2,
    label: "Pending",
    c: T.urgent,
    s: T.urgentSoft
  };
  if (delivered) return {
    rank: 1,
    label: "Delivered",
    c: T.blue,
    s: T.blueSoft
  };
  return {
    rank: 1,
    label: "Sent",
    c: T.dim,
    s: T.line
  };
};
// priority comparator: group rank asc, then newest first within a group
// Urgency outranks recency. A STAT page must never sort below a routine one.
const URANK = { STAT: 0, Urgent: 1, Routine: 2 };
const urank = p => URANK[p.urgency] ?? 3;
// live (unresolved) pages sort: lifecycle rank -> urgency -> newest first.
// resolved pages (rank 4) keep pure recency; urgency no longer steers attention there.
const byState = me => (a, b) => {
  const ra = pState(a, me).rank, rb = pState(b, me).rank;
  if (ra !== rb) return ra - rb;
  if (ra < 4) {
    const ua = urank(a), ub = urank(b);
    if (ua !== ub) return ua - ub;
  }
  return b.sentAt - a.sentAt;
};

// ---------- divisions (each a colour for the calendar) ----------
const DIV = {
  "Neurosurgery": "#4F46E5",
  "Cardiology": "#0E7490",
  "General Surgery": "#7C3AED",
  "Infectious Disease": "#A21CAF",
  "Plastic Surgery": "#475569"
};
const SENDER = "Dr. Yazdani",
  RECEIVER = "Dr. Chen";
